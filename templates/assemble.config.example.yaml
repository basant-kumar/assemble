# ============================================================================
# assemble.config.example.yaml — copy-paste catalog
# ----------------------------------------------------------------------------
# Everything here is OPTIONAL. Your real assemble.config.yaml only needs the
# overrides you care about. Copy any block below into it and adjust.
# Hero names are just agent-role keys — rename them if you must, but why
# would you. Not affiliated with Marvel or Disney — the MCU roster is only
# the default, swappable display theme (protocol constants are unthemed).
# Verify pricing ($/Mtok) against your provider's current rates —
# it only feeds pepper (ledger)'s books, never billing.
# ============================================================================

project:
  name: MyApp
  test: npm test
  lint: npm run lint
  typecheck: npm run typecheck

# ---------------------------------------------------------------------------
# PRESETS — pick one and stop reading, or go granular below.
#   solo — one model plays every hero (cheapest, no cross-check)
#   duo  — stark (architect) writes, strange (plan/design reviewer) reviews
#          cross-provider (TRIP's proven setup)
#   full — the whole roster, each hero tuned separately
# ---------------------------------------------------------------------------
mode: duo

# ---------------------------------------------------------------------------
# PROVIDERS — how each CLI is launched. claude/codex are built in.
# ---------------------------------------------------------------------------
providers:
  claude: { adapter: claude }
  codex:  { adapter: codex }
  gemini:
    adapter: generic
    command: 'gemini -m {model} -p {promptfile} --json'
    resume: none                # engine uses token-capped rolling digests
  opencode:
    adapter: generic
    command: 'opencode run --model {model} --prompt-file {promptfile}'
    resume: 'flag:--session {sessionid}'
  mistral:
    adapter: generic
    command: 'vibe -m {model} -f {promptfile} -o {outputfile}'
    resume: none

# ---------------------------------------------------------------------------
# MODEL PROFILE CATALOG — copy what you need into `models:`.
# All knobs optional; unsupported knobs on a provider warn + skip.
# ---------------------------------------------------------------------------
models:

  # ---- Claude ----
  fable-deep:                    # deep reasoning: plan, design, tricky reviews
    provider: claude
    model: claude-fable-5
    thinking: extended
    effort: high
    context_window: 200k
    max_output: 32k
    timeout: 20m
    speed: quality
    cost: { in: 15, out: 75 }

  opus-writer:                   # strong general writer/implementer
    provider: claude
    model: claude-opus-4-8
    thinking: auto
    context_window: 200k
    timeout: 15m
    cost: { in: 15, out: 75 }

  sonnet-worker:                 # workhorse for implement batches
    provider: claude
    model: claude-sonnet-4-6
    thinking: auto
    context_window: 200k
    timeout: 10m
    speed: balanced
    cost: { in: 3, out: 15 }

  haiku-fast:                    # cheap: small batches, memory-sync, triage
    provider: claude
    model: claude-haiku-4-5-20251001
    thinking: off
    context_window: 200k
    timeout: 5m
    speed: fast
    cost: { in: 1, out: 5 }

  # ---- Codex ----
  sol-reviewer:                  # cross-provider heavyweight reviewer
    provider: codex
    model: gpt-5.6-sol
    effort: xhigh
    context_window: 400k
    timeout: 20m
    cost: { in: 1.25, out: 10 }

  luna-worker:                   # fast implementer for parallel batches
    provider: codex
    model: gpt-5.6-luna
    effort: medium
    context_window: 400k
    timeout: 10m
    cost: { in: 0.6, out: 4 }

  codex-mini:                    # very cheap: lint-grade delta reviews
    provider: codex
    model: gpt-5-codex-mini
    effort: low
    timeout: 5m
    cost: { in: 0.25, out: 1 }

  # ---- Gemini ----
  gemini-pro:                    # huge context: full-tree reviews
    provider: gemini
    model: gemini-3-pro
    context_window: 1m
    timeout: 15m
    cost: { in: 2, out: 12 }

  gemini-flash:                  # cheap second-opinion reviews
    provider: gemini
    model: gemini-3-flash
    timeout: 5m
    speed: fast
    cost: { in: 0.3, out: 1.2 }

  # ---- OpenCode / Mistral (bring-your-own model id) ----
  opencode-default:
    provider: opencode
    model: your-model-id
    timeout: 10m

  vibe-default:
    provider: mistral
    model: mistral-vibe-large
    timeout: 10m

# ---------------------------------------------------------------------------
# THE ROSTER — hero roles bound to model profiles. Recast one hero here and
# every stage they work changes. fury (orchestrator), pepper (ledger) and
# heimdall (gates) are the engine itself (deterministic code), so they never
# appear here.
# ---------------------------------------------------------------------------
agents:
  stark:    { profile: fable-deep }      # architect: plan + technical design
  shuri:    { profile: opus-writer, skills: [ui-ux-pro-max] }  # UI/product design (flavor: ui) — skills travel with shuri
  strange:  { profile: sol-reviewer }    # plan/design reviewer — 14,000,605 futures
  vision:   { profile: luna-worker }     # delta code-review per batch
  danvers:  { profile: gemini-pro }      # final full-tree review, fresh thread
  thor:     { profile: opus-writer }     # heavy implementation batches
  hulk:     { profile: sonnet-worker }   # big refactors — smash carefully
  spidey:   { profile: haiku-fast }      # fast small batches
  hawkeye:  { profile: codex-mini }      # precision minor edits, never misses
  cap:      { profile: sonnet-worker }   # release notes; ship order = human's
  jarvis:   { profile: haiku-fast }      # ARCHI.md memory-sync + compaction

# ---------------------------------------------------------------------------
# STAGES — cast heroes into stages. Any stage also accepts an inline binding.
# `gate: human` is the enforced approval field — the stage completes into
# `awaiting_gate` and blocks until `assemble gate approve <stage>`.
# `workers:` / `parallel:` / `max_rounds:` are design-intent hints (illustrative;
# the engine assigns batches heavy-first and re-reviews until the verdict lands).
# ---------------------------------------------------------------------------
stages:
  plan:          { agent: stark }                     # stark drafts the plan
  # strange reviews (back-and-forth until sound); APPROVED then waits for the
  # human's sign-off — this gate is the approval-to-implement checkpoint.
  plan-review:   { agent: strange, gate: human, max_rounds: 3 }
  design:        { agent: stark, flavor: technical, when: auto }  # flavor: ui → shuri · when: auto (skippable when not needed, plan-review ratifies) | always | enabled: false
  design-review: { agent: strange, when: auto, max_rounds: 3 }
  implement:
    workers: [thor, spidey, hulk, hawkeye]            # call-sign pool
    parallel: 2
  code-review:   { agent: vision, max_rounds: 3 }     # delta reviews per batch
  code-review-full: { agent: danvers, when: auto }    # fresh-thread final pass
  # Example inline pin — cheap model for just this stage:
  # code-review: { provider: codex, model: gpt-5-codex-mini, max_rounds: 3 }
  release:       { agent: cap, gate: human }          # 🏛️ Council (human) signs off before ship
  memory-sync:   { agent: jarvis }

gates:                                                 # 🌈 heimdall (gates) — checklist
  implement: [plan-review: APPROVED, design-review: APPROVED]
  release:   [code-review: APPROVED, tests: PASS]

memory:                                                # 🧠 jarvis (memory)
  file: docs/assemble/ARCHI.md
  max_tokens: 8k

budget:                                                # 💼 pepper (ledger) — the card
  policy: pause                  # warn | pause | block — pause = card frozen at a human gate
  total: 25.00                   # $ ceiling across the whole run
  perStage:                      # optional $ caps for individual stages
    implement: 15.00
  perWorker:                     # optional $ caps for individual workers
    thor: 10.00

# ---------------------------------------------------------------------------
# One-off overrides without editing config:
#   ASSEMBLE_STAGE_code-review_MODEL=gemini-flash assemble code-review
# Ad-hoc off-book mission — 🥷 ronin (ad-hoc), never mutates run state:
#   assemble code-review --adhoc --target src/auth/
# ---------------------------------------------------------------------------
